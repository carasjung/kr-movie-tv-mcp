name: Initial Population (Run Once)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'yes' to confirm"
        required: true

env:
  TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
  KOBIS_API_KEY: ${{ secrets.KOBIS_API_KEY }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  populate-tmdb:
    name: "1/6 TMDB"
    runs-on: ubuntu-latest
    timeout-minutes: 600
    if: ${{ github.event.inputs.confirm == 'yes' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: PYTHONPATH=. python scripts/run_initial_tmdb.py

  populate-mdl:
    name: "2/6 MyDramaList"
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: populate-tmdb
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: playwright install chromium
      - run: PYTHONPATH=. python scripts/run_initial_mdl.py

  populate-kobis:
    name: "3/6 KOBIS historical"
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: populate-tmdb
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: PYTHONPATH=. python scripts/run_initial_kobis.py

  populate-naver-tv:
    name: "4/6 Naver TV"
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: populate-mdl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: playwright install chromium
      - run: PYTHONPATH=. python scripts/run_initial_naver_tv.py

  populate-justwatch:
    name: "5/6 JustWatch"
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: populate-mdl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: playwright install chromium
      - run: PYTHONPATH=. python scripts/run_initial_justwatch.py

  populate-wikipedia:
    name: "6a/6 Wikipedia"
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: populate-mdl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: PYTHONPATH=. python scripts/run_initial_wikipedia.py

  populate-awards:
    name: "6b/6 Awards"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: populate-mdl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: playwright install chromium
      - run: PYTHONPATH=. python scripts/run_initial_awards.py
