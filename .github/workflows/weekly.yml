name: Weekly Sync

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
  KOBIS_API_KEY: ${{ secrets.KOBIS_API_KEY }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  sync-kobis:
    name: Sync KOBIS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: PYTHONPATH=. python scripts/run_sync_kobis.py

  sync-justwatch:
    name: Sync JustWatch
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: sync-kobis
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: playwright install chromium
      - run: PYTHONPATH=. python scripts/run_sync_justwatch.py

  sync-wikipedia:
    name: Sync Wikipedia
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: sync-kobis
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: PYTHONPATH=. python scripts/run_sync_wikipedia.py

  sync-awards:
    name: Sync Awards
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: sync-kobis
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: playwright install chromium
      - run: PYTHONPATH=. python scripts/run_sync_awards.py
