name: Nightly Sync

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
  KOBIS_API_KEY: ${{ secrets.KOBIS_API_KEY }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  sync-tmdb:
    name: Sync TMDB
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: PYTHONPATH=. python scripts/run_sync_tmdb.py

  sync-mdl:
    name: Sync MyDramaList
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: sync-tmdb
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: playwright install chromium
      - run: PYTHONPATH=. python scripts/run_sync_mdl.py

  sync-naver-tv:
    name: Sync Naver TV
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: sync-mdl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: playwright install chromium
      - run: PYTHONPATH=. python scripts/run_sync_naver_tv.py
